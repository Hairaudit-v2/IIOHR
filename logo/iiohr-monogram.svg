<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 48" aria-labelledby="iiohr-monogram-title iiohr-monogram-desc">
  <title id="iiohr-monogram-title">IIOHR Logo</title>
  <desc id="iiohr-monogram-desc">IIOHR institute crest</desc>
  <defs>
    <style>
      .mono-text { font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif; font-size: 32px; font-weight: 600; fill: #4A3526; letter-spacing: 0.06em; }
    </style>
    <g id="follicle-o">
      <circle cx="0" cy="0" r="14" stroke="#4A3526" stroke-width="2" fill="none"/>
      <circle cx="0" cy="0" r="5" fill="#C8A47E" stroke="#4A3526" stroke-width="2"/>
    </g>
  </defs>
  <text x="0" y="36" class="mono-text">II</text>
  <g transform="translate(72, 24)">
    <use href="#follicle-o"/>
  </g>
  <text x="104" y="36" class="mono-text">HR</text>
</svg>
